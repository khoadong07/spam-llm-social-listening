version: '3.8'

services:
  spam-detection-api:
    build:
      context: .
      dockerfile: Dockerfile.optimized
    ports:
      - "8010:8000"
    environment:
      - DEEPINFRA_TOKEN=${DEEPINFRA_TOKEN}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_POOL_SIZE=100
      - MAX_CONCURRENT_REQUESTS=500
      - MAX_BATCH_SIZE=100
      - MEMORY_CACHE_SIZE=20000
      - ENABLE_BATCH_PROCESSING=true
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 512mb 
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 0
      --tcp-backlog 511
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

volumes:
  redis_data: